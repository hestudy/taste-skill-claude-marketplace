name: Sync upstream

on:
  schedule:
    # Daily at 06:00 UTC
    - cron: "0 6 * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: "How to land upstream changes"
        required: true
        default: pr
        type: choice
        options:
          - pr
          - direct

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: sync-upstream
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve token and mode
        id: meta
        env:
          # Optional PAT / fine-grained token with contents+pull_requests.
          # Needed when repo setting "Allow GitHub Actions to create and approve
          # pull requests" is off (GITHUB_TOKEN then cannot create PRs).
          SYNC_TOKEN: ${{ secrets.SYNC_UPSTREAM_TOKEN }}
        run: |
          set -euo pipefail
          if [[ -n "${SYNC_TOKEN:-}" ]]; then
            echo "token_source=secret" >> "$GITHUB_OUTPUT"
            echo "Using secrets.SYNC_UPSTREAM_TOKEN for git + gh."
          else
            echo "token_source=github_token" >> "$GITHUB_OUTPUT"
            echo "Using GITHUB_TOKEN (enable Actions PR permission or set SYNC_UPSTREAM_TOKEN if PR creation fails)."
          fi

          MODE="${{ github.event.inputs.mode || 'pr' }}"
          echo "mode=${MODE}" >> "$GITHUB_OUTPUT"

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.SYNC_UPSTREAM_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Detect upstream changes
        id: detect
        env:
          UPSTREAM_REPO: https://github.com/Leonxlnx/taste-skill.git
          UPSTREAM_BRANCH: main
        run: |
          set -euo pipefail
          git remote add upstream "$UPSTREAM_REPO" 2>/dev/null || git remote set-url upstream "$UPSTREAM_REPO"
          git fetch upstream "$UPSTREAM_BRANCH"
          COUNT="$(git rev-list --count "HEAD..upstream/${UPSTREAM_BRANCH}")"
          echo "commit_count=${COUNT}" >> "$GITHUB_OUTPUT"
          if [[ "$COUNT" -eq 0 ]]; then
            echo "up_to_date=true" >> "$GITHUB_OUTPUT"
            echo "Already up to date with upstream/${UPSTREAM_BRANCH}."
          else
            echo "up_to_date=false" >> "$GITHUB_OUTPUT"
            echo "Found ${COUNT} new upstream commit(s)."
          fi

      - name: Merge upstream (PR branch or direct to main)
        if: steps.detect.outputs.up_to_date == 'false'
        id: merge
        env:
          UPSTREAM_REPO: https://github.com/Leonxlnx/taste-skill.git
          UPSTREAM_BRANCH: main
          BASE_REF: main
          MODE: ${{ steps.meta.outputs.mode }}
        run: |
          set -euo pipefail

          if [[ "$MODE" == "direct" ]]; then
            git checkout -B main origin/main
            chmod +x scripts/sync-upstream.sh
            scripts/sync-upstream.sh

            grep -q '^changed=' "$GITHUB_OUTPUT" || echo "changed=false" >> "$GITHUB_OUTPUT"
            grep -q '^conflict=' "$GITHUB_OUTPUT" || echo "conflict=false" >> "$GITHUB_OUTPUT"
            echo "branch=main" >> "$GITHUB_OUTPUT"

            if grep -q '^changed=true' "$GITHUB_OUTPUT"; then
              git push origin main
              echo "Pushed upstream merge directly to main."
            else
              echo "Nothing to push."
            fi
            exit 0
          fi

          BRANCH="sync/upstream-$(date -u +%Y%m%d)"
          if git ls-remote --exit-code --heads origin "$BRANCH" >/dev/null 2>&1; then
            git fetch origin "$BRANCH"
            git checkout -B "$BRANCH" "origin/${BRANCH}"
          else
            git checkout -B "$BRANCH" origin/main
          fi

          chmod +x scripts/sync-upstream.sh
          scripts/sync-upstream.sh

          grep -q '^changed=' "$GITHUB_OUTPUT" || echo "changed=false" >> "$GITHUB_OUTPUT"
          grep -q '^conflict=' "$GITHUB_OUTPUT" || echo "conflict=false" >> "$GITHUB_OUTPUT"
          echo "branch=${BRANCH}" >> "$GITHUB_OUTPUT"

          if grep -q '^changed=true' "$GITHUB_OUTPUT"; then
            git push -u origin "$BRANCH"
          else
            echo "Sync branch already contains upstream; nothing to push."
            # Previous run may have left a sync branch that is still ahead of main
            # (e.g. PR create failed). Still surface it for the PR step.
            AHEAD_OF_MAIN="$(git rev-list --count "origin/main..HEAD")"
            if [[ "${AHEAD_OF_MAIN}" -gt 0 ]]; then
              echo "changed=true" >> "$GITHUB_OUTPUT"
              echo "Branch ${BRANCH} is ${AHEAD_OF_MAIN} commit(s) ahead of main; will open/update PR."
            fi
          fi

      - name: Open or update pull request
        if: >-
          steps.detect.outputs.up_to_date == 'false'
          && steps.merge.outputs.changed == 'true'
          && steps.meta.outputs.mode == 'pr'
        id: pr
        env:
          GH_TOKEN: ${{ secrets.SYNC_UPSTREAM_TOKEN || secrets.GITHUB_TOKEN }}
          BRANCH: ${{ steps.merge.outputs.branch }}
          COMMIT_COUNT: ${{ steps.detect.outputs.commit_count }}
          CONFLICT: ${{ steps.merge.outputs.conflict }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          TITLE="chore(sync): upstream Leonxlnx/taste-skill (${COMMIT_COUNT} commit(s))"

          if [[ "${CONFLICT:-false}" == "true" ]]; then
            CONFLICT_NOTE="> Merge conflicts were auto-resolved by the sync script (upstream README + restored marketplace overlay). Please review the diff carefully before merging."
          else
            CONFLICT_NOTE="No merge conflicts were reported by the sync script."
          fi

          BODY="$(cat <<EOF
          ## Upstream sync

          Automated merge from [\`Leonxlnx/taste-skill\`](https://github.com/Leonxlnx/taste-skill) \`main\`.

          - New upstream commits: **${COMMIT_COUNT}**
          - Claude marketplace overlay (\`.claude-plugin/\`) was restored after the merge
          - README fork overlays were preserved (\`CLAUDE-FORK-NOTE\`, \`CLAUDE-MARKETPLACE-INSTALL\`, \`CLAUDE-FORK-DOCS\`)

          ${CONFLICT_NOTE}

          After merging, Claude Code users can refresh with:

          \`\`\`
          /plugin marketplace update taste-skill
          \`\`\`
          EOF
          )"

          BODY="$(printf '%s\n' "$BODY" | sed -E 's/^ {10}//')"
          COMPARE_URL="https://github.com/${REPO}/compare/main...${BRANCH}?expand=1"

          EXISTING="$(gh pr list --base main --head "$BRANCH" --state open --json number --jq '.[0].number // empty' || true)"
          if [[ -n "$EXISTING" ]]; then
            gh pr edit "$EXISTING" --title "$TITLE" --body "$BODY"
            echo "Updated PR #${EXISTING}"
            echo "pr_url=https://github.com/${REPO}/pull/${EXISTING}" >> "$GITHUB_OUTPUT"
            echo "pr_created=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          set +e
          if gh label list --json name --jq '.[].name' 2>/dev/null | grep -Fxq 'upstream-sync'; then
            CREATE_OUT="$(gh pr create --base main --head "$BRANCH" --title "$TITLE" --body "$BODY" --label "upstream-sync" 2>&1)"
          else
            CREATE_OUT="$(gh pr create --base main --head "$BRANCH" --title "$TITLE" --body "$BODY" 2>&1)"
          fi
          CREATE_STATUS=$?
          set -e

          if [[ "$CREATE_STATUS" -eq 0 ]]; then
            echo "$CREATE_OUT"
            echo "pr_url=${CREATE_OUT}" >> "$GITHUB_OUTPUT"
            echo "pr_created=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "pr_created=false" >> "$GITHUB_OUTPUT"
          echo "compare_url=${COMPARE_URL}" >> "$GITHUB_OUTPUT"

          {
            echo "## Upstream sync branch pushed, but PR was not created"
            echo
            echo "GitHub rejected PR creation with:"
            echo
            echo '```'
            echo "$CREATE_OUT"
            echo '```'
            echo
            echo "Branch \`${BRANCH}\` is already on the remote. Open a PR manually:"
            echo
            echo "- ${COMPARE_URL}"
            echo
            echo "### Fix options"
            echo
            echo "1. **Repo setting (recommended for GITHUB_TOKEN):** Settings → Actions → General → Workflow permissions → enable **Allow GitHub Actions to create and approve pull requests**"
            echo "2. **PAT secret:** create a classic/fine-grained token with \`contents:write\` + \`pull-requests:write\`, add repo secret \`SYNC_UPSTREAM_TOKEN\`, re-run the workflow"
            echo "3. **Direct mode:** re-run with \`mode=direct\` to push the upstream merge straight to \`main\` (no PR)"
          } >> "$GITHUB_STEP_SUMMARY"

          echo "::warning::PR creation failed; sync branch was pushed. See job summary for a compare link and fix options."
          # Do not fail the job: the sync itself succeeded.
          exit 0
